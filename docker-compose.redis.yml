version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: hide-my-email-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      - REDIS_REPLICATION_MODE=master

  redis-backup:
    image: redis:7-alpine
    container_name: hide-my-email-redis-backup
    volumes:
      - redis-data:/data
      - ./backups:/backups
    entrypoint: |
      sh -c '
      while true; do
        echo "Creating backup at $(date)"
        cp /data/dump.rdb /backups/dump-$(date +%Y%m%d-%H%M%S).rdb
        find /backups -name "dump-*.rdb" -mtime +7 -delete
        sleep 86400
      done
      '
    restart: unless-stopped

volumes:
  redis-data:
    driver: local

networks:
  default:
    name: hide-my-email-network
