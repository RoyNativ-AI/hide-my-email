# Redis Configuration for Hide My Email
# Privacy-first, persistent, secure

# Network
bind 0.0.0.0
protected-mode yes
port 6379
timeout 300
tcp-keepalive 300

# Persistence - CRITICAL for production!
# RDB: Point-in-time snapshots
save 900 1      # Save after 900 sec (15 min) if at least 1 key changed
save 300 10     # Save after 300 sec (5 min) if at least 10 keys changed
save 60 10000   # Save after 60 sec if at least 10000 keys changed

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF: Append Only File (more durable)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Security
requirepass ${REDIS_PASSWORD:-changeme}

# Privacy: Disable dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command CONFIG "CONFIG_e8f3a9b2c1d4"

# Logging
loglevel notice
logfile ""

# Performance
databases 16
always-show-logo no

# Slow log (for debugging)
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency monitoring
latency-monitor-threshold 100
